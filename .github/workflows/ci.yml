name: ci
on:
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: '22.13.1'
          cache: 'yarn'
      - run: yarn install --immutable
      - run: yarn lint:eslint
      - run: yarn lint:prettier
      - run: yarn build
      - run: yarn test
